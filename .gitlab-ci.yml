# ═══════════════════════════════════════════════════════════════════
#  AcreetionOS ISO Build Pipeline
#  Branch: acreetionos
#  Builder: self-hosted shell runner on Dell Precision 7910
#
#  RUNNER SETUP (run once on the build server):
#    gitlab-runner register \
#      --url https://gitlab.acreetionos.org \
#      --token <YOUR_RUNNER_TOKEN> \
#      --executor shell \
#      --description "acreetionos-builder" \
#      --tag-list "acreetionos-builder" \
#      --run-untagged false
#
#  The runner user needs passwordless sudo (or run as root).
#  mkarchiso requires loop device access for squashfs builds.
# ═══════════════════════════════════════════════════════════════════

stages:
  - prepare
  - build
  - publish

variables:
  ISO_OUT_DIR:   "${CI_PROJECT_DIR}/out"
  WORK_DIR:      "${CI_PROJECT_DIR}/work"
  ISO_LABEL:     "AcreetionOS"
  PUBLISH_DIR:   "/srv/http/iso"

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "acreetionos"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

# ───────────────────────────────────────────────────────────────────
# STAGE 1 – PREPARE
# Refresh keyring and ensure archiso + build deps are installed
# ───────────────────────────────────────────────────────────────────
prepare:deps:
  stage: prepare
  tags:
    - acreetionos-builder
  script:
    - echo "==> Initialising pacman keyring..."
    - pacman-key --init
    - pacman-key --populate archlinux
    - echo "==> Refreshing databases and upgrading keyring..."
    - pacman -Sy --noconfirm --config "${CI_PROJECT_DIR}/pacman.conf" archlinux-keyring
    - echo "==> Installing archiso build dependencies..."
    - pacman -S --noconfirm --needed --config "${CI_PROJECT_DIR}/pacman.conf" archiso squashfs-tools dosfstools erofs-utils mtools xorriso libarchive grub edk2-shell
    - echo "==> Build environment ready."
    - mkarchiso --version
  rules:
    - when: always

# ───────────────────────────────────────────────────────────────────
# STAGE 2 – BUILD ISO
# pacman.conf defines:
#   [acreetionOSREPO-main]  iso.acreetionos.org:8448/repo-main/$arch
#   [personal]              iso.acreetionos.org:8448/personal
#   [temp-repo]             iso.acreetionos.org:8448/temp_repo/
#   IgnorePkg = v4l2loopback-dkms
#   ParallelDownloads = 25
# ───────────────────────────────────────────────────────────────────
build:iso:
  stage: build
  tags:
    - acreetionos-builder
  needs:
    - prepare:deps
  timeout: 3h
  before_script:
    - echo "==> Cleaning previous build artifacts..."
    - rm -rf "${WORK_DIR}" "${ISO_OUT_DIR}"
    - mkdir -p "${ISO_OUT_DIR}"
  script:
    - echo "==> Starting AcreetionOS ISO build..."
    - echo "    Commit  ${CI_COMMIT_SHORT_SHA}  Branch  ${CI_COMMIT_BRANCH:-tag:$CI_COMMIT_TAG}  Runner  ${CI_RUNNER_DESCRIPTION}"
    - cd "${CI_PROJECT_DIR}"
    - mkarchiso -L "${ISO_LABEL}" -v -w "${WORK_DIR}" -o "${ISO_OUT_DIR}" -C "${CI_PROJECT_DIR}/pacman.conf" "${CI_PROJECT_DIR}"
    - echo "==> Build complete."
    - ls -lh "${ISO_OUT_DIR}"/*.iso
    - cd "${ISO_OUT_DIR}"
    - sha256sum *.iso > SHA256SUMS
    - md5sum *.iso > MD5SUMS
    - cat SHA256SUMS
  after_script:
    - rm -rf "${WORK_DIR}"
  artifacts:
    name: "AcreetionOS-${CI_COMMIT_SHORT_SHA}"
    paths:
      - out/*.iso
      - out/SHA256SUMS
      - out/MD5SUMS
    expire_in: 30 days

# ───────────────────────────────────────────────────────────────────
# STAGE 3 – PUBLISH
# Copies ISO to the nginx-served directory, updates latest symlink,
# keeps the 3 most recent builds and prunes the rest.
# ───────────────────────────────────────────────────────────────────
publish:iso:
  stage: publish
  tags:
    - acreetionos-builder
  needs:
    - build:iso
  script:
    - ISO_FILE=$(ls "${ISO_OUT_DIR}"/*.iso | head -n1)
    - ISO_NAME=$(basename "${ISO_FILE}")
    - DATED_NAME="AcreetionOS-$(date +%Y%m%d)-${CI_COMMIT_SHORT_SHA}.iso"
    - echo "==> Publishing ${ISO_NAME} as ${DATED_NAME}"
    - mkdir -p "${PUBLISH_DIR}"
    - cp "${ISO_FILE}" "${PUBLISH_DIR}/${DATED_NAME}"
    - cp "${ISO_OUT_DIR}/SHA256SUMS" "${PUBLISH_DIR}/SHA256SUMS"
    - cp "${ISO_OUT_DIR}/MD5SUMS" "${PUBLISH_DIR}/MD5SUMS"
    - ln -sf "${PUBLISH_DIR}/${DATED_NAME}" "${PUBLISH_DIR}/AcreetionOS-latest.iso"
    - ls -t "${PUBLISH_DIR}"/AcreetionOS-2*.iso 2>/dev/null | tail -n +4 | xargs -r rm -v
    - echo "==> Done. Symlink AcreetionOS-latest.iso -> ${DATED_NAME}"
    - ls -lh "${PUBLISH_DIR}"/AcreetionOS*.iso
  environment:
    name: iso-server
    url: https://iso.acreetionos.org
  rules:
    - if: '$CI_COMMIT_BRANCH == "acreetionos"'
      when: on_success
    - if: '$CI_COMMIT_TAG'
      when: on_success
